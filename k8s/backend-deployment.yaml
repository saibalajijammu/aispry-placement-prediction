apiVersion: apps/v1
kind: Deployment

metadata:
  name: fastapi-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fastapi-backend

  template:
    metadata:
      labels:
        app: fastapi-backend

    spec:
      containers:
        - name: fastapi-backend
          image: saibalajijammu/aispry-backend:latest

          ports:
            - containerPort: 8000