name: AISPRY CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install DVC
      run: |
        pip install dvc

    - name: Pull Dataset
      run: |
        dvc pull

    - name: Run Tests
      run: |
        python -c "print('Pipeline Successful')"

    - name: Train Model
      run: |
        python training.py

  docker-build:
    needs: build-and-train
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t saibalajijammu/aispry-backend:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push saibalajijammu/aispry-backend:${{ github.sha }}
