services:

  postgres:
    image: postgres:14
    container_name: marquez_postgres

    environment:
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez

    ports:
      - "5432:5432"

  marquez:
    image: marquezproject/marquez:latest
    container_name: marquez

    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
      POSTGRES_DB: marquez
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001

    ports:
      - "5000:5000"
      - "5001:5001"

    depends_on:
      - postgres

